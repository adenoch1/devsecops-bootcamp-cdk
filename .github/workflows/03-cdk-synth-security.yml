name: CDK Synth + Security (cdk-nag)

on:
  pull_request:
    branches: ["main"]
    paths:
      - "cdk/**"
      - ".github/workflows/03-cdk-synth-security.yml"

permissions:
  contents: read

jobs:
  synth-and-nag:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: cdk/requirements.txt

      - name: Install CDK CLI + Python deps
        run: |
          npm install -g aws-cdk
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: cdk synth (cdk-nag runs as an Aspect during synth)
        # No AWS credentials needed: every stack here is built from fresh
        # resources (ec2.Vpc, kms.Key, etc.), not from Vpc.from_lookup() or
        # other context lookups that would need real AWS API calls.
        run: cdk synth --all
