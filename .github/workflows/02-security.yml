name: Security

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  sast-and-deps:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Bandit (SAST) - fail on Medium/High only
        run: bandit -r app -ll -ii

      - name: pip-audit (Dependencies)
        run: pip-audit -r app/requirements.txt

  trivy-fs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan (Filesystem) - fail on High/Critical only
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

  gitleaks:
    runs-on: ubuntu-latest

    steps:
      # Full history, not just the PR diff -- a secret committed and later
      # "removed" in a follow-up commit still exists in history and is
      # still a real leak. fetch-depth: 0 is required for gitleaks to see
      # past commits at all.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          # Free for public repos (this one) -- a license is only required
          # for private repos under a GitHub organization account.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
